name: Bug report
description: Report a bug on lennyobez.com
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happens.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      description: "For example: Chrome 130 on Windows 11, Safari 18 on macOS 15."
    validations:
      required: false

  - type: dropdown
    id: section
    attributes:
      label: Page or section
      description: Which part of the site is affected?
      options:
        - Landing
        - Development
        - Photography
        - Explore
        - Blog
        - About
        - Contact
        - Resume
        - Colophon
        - Legal
        - Other
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the issue.
    validations:
      required: false
